<header class="site-header">
  <div class="top-strip">
    <div class="container strip-content">
      <div class="strip-left">
        <span class="info-item">
          <i class="fa-solid fa-location-dot icon" aria-hidden="true"></i>
          <span>Muqam Chowk Mardan</span>
        </span>
        <span class="info-item">
          <i class="fa-regular fa-clock icon" aria-hidden="true"></i>
          <span>Mon-Sat: 09:00 AM - 10.00 PM</span>
        </span>
      </div>
      <div class="strip-right">
        <a href="#" aria-label="Facebook">
          <i class="fa-brands fa-facebook-f" aria-hidden="true"></i>
        </a>
        <a href="#" aria-label="Instagram">
          <i class="fa-brands fa-instagram" aria-hidden="true"></i>
        </a>
      </div>
    </div>
  </div>

  <div class="main-nav">
    <div class="container nav-content">
      <a class="brand" href="/" aria-label="Alsaadah Home">
        <img
          class="brand-logo"
          src="/Blue%20and%20red%20swoosh%20logo%20(1).png"
          alt="Alsaadah Travel Partner logo"
        />
      </a>

      <button
        class="menu-toggle"
        type="button"
        [attr.aria-expanded]="menuOpen"
        aria-label="Toggle navigation menu"
        (click)="toggleMenu()"
      >
        <i class="fa-solid" [class.fa-bars]="!menuOpen" [class.fa-xmark]="menuOpen" aria-hidden="true"></i>
      </button>

      <nav class="nav-links" [class.open]="menuOpen" aria-label="Main navigation">
        <a class="active" href="/" (click)="closeMenu()">HOME</a>
        <a href="/about-us" (click)="closeMenu()">ABOUT US</a>
        <a href="/services" (click)="closeMenu()">SERVICES</a>
        <a href="/contact-us" (click)="closeMenu()">CONTACT US</a>
      </nav>
    </div>
  </div>
</header>
