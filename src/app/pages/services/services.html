<ng-container *ngIf="servicesContent$ | async as servicesContent">
<section class="services-hero animate-fade-up is-visible" aria-label="Our Services">
  <div class="services-hero__overlay"></div>

  <div class="services-hero__content">
    <h1 class="animate-fade-up is-visible">{{ servicesContent.heroTitle }}</h1>
    <p class="animate-fade-up animate-delay-2 is-visible">{{ servicesContent.heroSubtitle }}</p>
  </div>
</section>

<section class="services-grid animate-fade-up" aria-label="Our Key Services">
  <div class="services-grid__container">
    <div class="services-grid__head animate-fade-up">
      <h2>{{ servicesContent.gridTitle }}</h2>
      <p>{{ servicesContent.gridSubtitle }}</p>
    </div>

    <div class="services-grid__cards">
      <article class="service-item animate-fade-up" *ngFor="let card of servicesContent.cards; let i = index" [ngClass]="'animate-delay-' + ((i % 3) + 1)">
        <div class="service-item__icon"><i [class]="card.icon" aria-hidden="true"></i></div>
        <h3>{{ card.title }}</h3>
        <p>{{ card.description }}</p>
        <a href="/contact-us">Learn More</a>
      </article>
    </div>
  </div>
</section>
 </ng-container>
<app-custom-sections [sections]="customSections" *ngIf="customSections$ | async as customSections"></app-custom-sections>
