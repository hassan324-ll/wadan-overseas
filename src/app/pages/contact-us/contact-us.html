<section class="contact-hero" aria-label="Get in touch with us">
  <div class="contact-hero__overlay"></div>

  <div class="contact-hero__content">
    <h1>{{ contactContent.heroTitle }}</h1>
    <p>{{ contactContent.heroSubtitle }}</p>

    <div class="contact-scroll-indicator" aria-hidden="true">
      <span></span>
    </div>
  </div>
</section>

<section class="contact-form-section" aria-label="Send us a message">
  <div class="contact-form-section__container">
    <div class="contact-form-card">
      <div class="contact-form-card__head">
        <h2>{{ contactContent.formTitle }}</h2>
        <p>{{ contactContent.formSubtitle }}</p>
      </div>

      <form #contactForm="ngForm" (ngSubmit)="submitInquiry(contactForm)" novalidate>
        <div class="form-grid">
          <div class="form-field">
            <label for="fullName">Full Name</label>
            <div class="field-input">
              <i class="fa-regular fa-user" aria-hidden="true"></i>
              <input
                id="fullName"
                name="fullName"
                type="text"
                required
                ngModel
                placeholder="Enter your full name"
              />
            </div>
          </div>

          <div class="form-field">
            <label for="email">Email Address</label>
            <div class="field-input">
              <i class="fa-regular fa-envelope" aria-hidden="true"></i>
              <input
                id="email"
                name="email"
                type="email"
                required
                email
                ngModel
                placeholder="Enter your email"
              />
            </div>
          </div>

          <div class="form-field">
            <label for="phone">Phone Number</label>
            <div class="field-input">
              <i class="fa-solid fa-phone" aria-hidden="true"></i>
              <input
                id="phone"
                name="phone"
                type="tel"
                required
                ngModel
                placeholder="Enter your phone number"
              />
            </div>
          </div>

          <div class="form-field">
            <label for="profession">Profession / Trade</label>
            <div class="field-input">
              <i class="fa-solid fa-briefcase" aria-hidden="true"></i>
              <input
                id="profession"
                name="profession"
                type="text"
                required
                ngModel
                placeholder="e.g. Electrician, Driver, Welder"
              />
            </div>
          </div>
        </div>

        <div class="form-field form-field--full">
          <label for="message">Message (Optional)</label>
          <div class="field-input field-input--textarea">
            <i class="fa-regular fa-message" aria-hidden="true"></i>
            <textarea
              id="message"
              name="message"
              rows="5"
              ngModel
              placeholder="Write your message"
            ></textarea>
          </div>
        </div>

        <label class="consent-check">
          <input type="checkbox" name="consentChecked" [(ngModel)]="consentChecked" />
          <span>I agree to the processing of my information for consultation and follow-up.</span>
        </label>

        <button type="submit" class="submit-btn">
          <i class="fa-solid fa-paper-plane" aria-hidden="true"></i>
          Send Message
        </button>

        <p class="success-message" *ngIf="showSuccess">
          <i class="fa-solid fa-circle-check" aria-hidden="true"></i>
          Thank you! Your message has been sent successfully.
        </p>
      </form>
    </div>

    <aside class="contact-form-visual" aria-hidden="true">
      <div class="contact-form-visual__image"></div>
      <div class="contact-form-visual__tag">
        <i class="fa-solid fa-globe" aria-hidden="true"></i>
        Global Reach. Trusted Guidance.
      </div>
    </aside>
  </div>
</section>

<section class="office-map-section" aria-label="Our office location">
  <div class="office-map-section__container">
    <div class="office-map-section__head">
      <h2>{{ contactContent.visitTitle }}</h2>
      <p>{{ contactContent.visitDescription }}</p>
    </div>

    <div class="office-map-frame">
      <div class="office-map-pin" aria-hidden="true">
        <i class="fa-solid fa-location-dot"></i>
      </div>
      <iframe
        title="WADAN Employment Promoters office location"
        loading="lazy"
        referrerpolicy="no-referrer-when-downgrade"
        [src]="safeMapUrl"
      ></iframe>
    </div>
  </div>
</section>
<app-custom-sections [sections]="customSections" *ngIf="customSections$ | async as customSections"></app-custom-sections>
